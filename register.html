<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Zongrui Liu">
  <meta name="description" content="Breakout — Register">
  <title>Breakout — Register</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 120px);
      padding: 40px 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      padding: 48px 36px;
    }

    .auth-title {
      font-family: var(--font-display);
      font-size: 16px;
      color: var(--neon-cyan);
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 3px;
    }

    .auth-sub {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 36px;
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .auth-footer a {
      color: var(--neon-cyan);
      text-decoration: none;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .auth-error {
      background: rgba(255, 51, 85, 0.1);
      border: 1px solid rgba(255, 51, 85, 0.3);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--danger);
      font-size: 12px;
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }

    .auth-error.show {
      display: block;
    }

    .password-rules {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">BREAKOUT</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="game.html">Play</a></li>
      <li><a href="leaderboard.html">Leaderboard</a></li>
      <li><a href="login.html" id="nav-auth-link">Login</a></li>
    </ul>
  </nav>

  <div class="auth-wrapper">
    <div class="card auth-card fade-in">
      <h2 class="auth-title">REGISTER</h2>
      <p class="auth-sub">Create an account to save scores</p>

      <div class="auth-error" id="regError"></div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Choose a username" autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Create a password" autocomplete="new-password">
        <div class="password-rules">At least 4 characters</div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm your password" autocomplete="new-password">
      </div>

      <button class="btn btn-primary" style="width:100%; margin-top:8px;" id="btnRegister">Create Account</button>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Login here</a>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast toast-success" id="toast"></div>

  <script>
    function showError(msg) {
      const el = document.getElementById('regError');
      el.textContent = msg;
      el.classList.add('show');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    document.getElementById('btnRegister').addEventListener('click', () => {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;

      document.getElementById('regError').classList.remove('show');

      if (!username || !password || !confirm) {
        showError('Please fill in all fields.');
        return;
      }
      if (username.length < 2 || username.length > 20) {
        showError('Username must be 2-20 characters.');
        return;
      }
      if (password.length < 4) {
        showError('Password must be at least 4 characters.');
        return;
      }
      if (password !== confirm) {
        showError('Passwords do not match.');
        return;
      }

      // Try PHP backend
      fetch('php/register.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            localStorage.setItem('breakout_user', JSON.stringify(data.user));
            showToast('Account created!');
            setTimeout(() => window.location.href = 'game.html', 800);
          } else {
            showError(data.message || 'Registration failed.');
          }
        })
        .catch(() => {
          // Fallback: localStorage registration
          const users = JSON.parse(localStorage.getItem('breakout_users') || '[]');
          if (users.find(u => u.username === username)) {
            showError('Username already taken.');
            return;
          }
          const newUser = { id: Date.now(), username, password };
          users.push(newUser);
          localStorage.setItem('breakout_users', JSON.stringify(users));
          localStorage.setItem('breakout_user', JSON.stringify({ id: newUser.id, username }));
          showToast('Account created!');
          setTimeout(() => window.location.href = 'game.html', 800);
        });
    });

    // Enter key
    document.getElementById('confirmPassword').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btnRegister').click();
    });
  </script>
</body>
</html>
