<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Zongrui Liu">
  <meta name="description" content="Breakout — Login">
  <title>Breakout — Login</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 120px);
      padding: 40px 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      padding: 48px 36px;
    }

    .auth-title {
      font-family: var(--font-display);
      font-size: 16px;
      color: var(--neon-cyan);
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 3px;
    }

    .auth-sub {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 36px;
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .auth-footer a {
      color: var(--neon-cyan);
      text-decoration: none;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .auth-error {
      background: rgba(255, 51, 85, 0.1);
      border: 1px solid rgba(255, 51, 85, 0.3);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--danger);
      font-size: 12px;
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }

    .auth-error.show {
      display: block;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">BREAKOUT</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="game.html">Play</a></li>
      <li><a href="leaderboard.html">Leaderboard</a></li>
      <li><a href="login.html" class="active" id="nav-auth-link">Login</a></li>
    </ul>
  </nav>

  <div class="auth-wrapper">
    <div class="card auth-card fade-in">
      <h2 class="auth-title">LOGIN</h2>
      <p class="auth-sub">Sign in to save your scores</p>

      <div class="auth-error" id="loginError"></div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
      </div>

      <button class="btn btn-primary" style="width:100%; margin-top:8px;" id="btnLogin">Login</button>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Register here</a>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast toast-success" id="toast"></div>

  <script>
    // Redirect if already logged in
    const existing = JSON.parse(localStorage.getItem('breakout_user') || 'null');
    if (existing) {
      const link = document.getElementById('nav-auth-link');
      link.textContent = existing.username;
      link.href = '#';
    }

    function showError(msg) {
      const el = document.getElementById('loginError');
      el.textContent = msg;
      el.classList.add('show');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    document.getElementById('btnLogin').addEventListener('click', () => {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      document.getElementById('loginError').classList.remove('show');

      if (!username || !password) {
        showError('Please fill in all fields.');
        return;
      }

      // Try PHP backend
      fetch('./login.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            localStorage.setItem('breakout_user', JSON.stringify(data.user));
            showToast('Login successful!');
            setTimeout(() => window.location.href = 'game.html', 800);
          } else {
            showError(data.message || 'Invalid credentials.');
          }
        })
        .catch(() => {
          // Fallback: localStorage auth
          const users = JSON.parse(localStorage.getItem('breakout_users') || '[]');
          const found = users.find(u => u.username === username && u.password === password);
          if (found) {
            localStorage.setItem('breakout_user', JSON.stringify({ id: found.id, username: found.username }));
            showToast('Login successful!');
            setTimeout(() => window.location.href = 'game.html', 800);
          } else {
            showError('Invalid username or password.');
          }
        });
    });

    // Enter key
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btnLogin').click();
    });
  </script>
</body>
</html>
